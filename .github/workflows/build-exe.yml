name: Build and Release Windows EXE

# This allows you to manually trigger the workflow and type a version number
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release Version (e.g., v1.0, v1.1)'
        required: true
        default: 'v1.0'

jobs:
  build-and-release:
    runs-on: windows-latest
    
    # CRITICAL: This gives the script permission to create a release in your repo
    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller pillow pywin32

    - name: Build the EXE with PyInstaller
      run: |
        pyinstaller --onefile --noconsole mission_scanner.py

    - name: Create GitHub Release and Upload EXE
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ github.event.inputs.version }}
        name: Mission Scanner App ${{ github.event.inputs.version }}
        body: "Automated release of the Mission Office ID Scanner."
        files: dist/mission_scanner.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}